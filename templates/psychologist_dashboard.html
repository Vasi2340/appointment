{% extends "base.html" %}

{% block content %}
<h2>Psychologist Dashboard</h2>

<h3>Your Appointments</h3>

<ul>
{% for appointment in appointments %}
    <li>
        {{ appointment.client.username }} -
        {{ appointment.start_time }}
    </li>
{% empty %}
    <li>No appointments yet</li>
{% endfor %}
</ul>

{% endblock %}
